services:
  postgis:
    build:
      context: ./db
      dockerfile: Dockerfile.db
    image: iva/postgis:18-3.6-ogrfdw
    container_name: postgis
    environment:
      POSTGRES_DB: impacted_values
      POSTGRES_USER: iva_job
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/ddl.sql:/ddl/ddl.sql:ro
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "iva_job", "-d", "impacted_values"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iva_net

  initdb:
    image: postgres:18
    container_name: iva-initdb
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      PGPASSWORD: ${PGPASSWORD}
      APP_PGPASSWORD: ${APP_PGPASSWORD}
    volumes:
      - ./db/ddl.sql:/ddl/ddl.sql:ro
    entrypoint:
      - bash
      - -c
      - >
        psql -h postgis -U iva_job -d impacted_values
        -v app_pass="$APP_PGPASSWORD"
        -v job_pass="$PGPASSWORD"
        -f /ddl/ddl.sql
    restart: "no"
    networks:
      - iva_net

  load-zones:
    build:
      context: ./job
    container_name: iva-load-zones
    env_file: [.env]
    environment:
      PGPASSWORD: ${PGPASSWORD}
      PGHOST: postgis
      PGPORT: 5432
      PGUSER: iva_job
      PGDATABASE: impacted_values
    depends_on:
      initdb:
        condition: service_completed_successfully
    restart: "no"
    command:
      [
        "bash",
        "-c",
        "python -m iva_job.loaders /data"
      ]
    volumes:
      - ./data:/data:ro
    networks:
      - iva_net

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: pg_tileserv
    environment:
      DATABASE_URL: postgresql://iva_app:${APP_PGPASSWORD}@postgis:5432/impacted_values?sslmode=disable
      TS_DEBUG: "true"
    volumes:
      - ./config/pg_tileserv.toml:/config/pg_tileserv.toml:ro
    ports:
      - "7800:7800"
    depends_on:
      initdb:
        condition: service_completed_successfully
    networks:
      - iva_net

  pg_featureserv:
    image: pramsey/pg_featureserv:latest
    container_name: pg_featureserv
    environment:
      DATABASE_URL: postgresql://iva_app:${APP_PGPASSWORD}@postgis:5432/impacted_values?sslmode=disable
      LISTEN_ADDR: 0.0.0.0
      PORT: 9000
    ports:
      - "9000:9000"
    depends_on:
      initdb:
        condition: service_completed_successfully
    networks:
      - iva_net

  iva-job:
    build:
      context: ./job
    container_name: iva-job
    env_file: [.env]
    environment:
      FEATURE_SET_CODES: ecumene,first_nations,highways,rail,facilities,census
      IVA_BUILDINGCOUNT_RASTER: /data/IVA_buildingcount_100m.tif
      PGPASSWORD: ${PGPASSWORD}
      PGHOST: postgis
      PGPORT: 5432
      PGUSER: iva_job
      PGDATABASE: impacted_values
    depends_on:
      postgis:
        condition: service_healthy
      initdb:
        condition: service_completed_successfully
      load-zones:
        condition: service_completed_successfully
    restart: on-failure
    command:
      [
        "bash",
        "-c",
        "python -m iva_job.main --horizons 3,7 --date 2026-04-21"
      ]
    volumes:
      - ./data:/data:ro
    networks:
      - iva_net

volumes:
  pgdata:

networks:
  iva_net: